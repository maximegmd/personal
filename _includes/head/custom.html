{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<!-- Force light theme regardless of OS preference -->
<script>
  try { localStorage.setItem("theme", "light"); } catch (e) {}
  document.documentElement.removeAttribute("data-theme");
</script>

<!-- Publications list -->
<style>
  /* Year navigation header */
  .pub-year-nav {
    margin: 1em 0 0.5em;
    font-size: 0.95em;
  }
  .pub-year-nav a {
    text-decoration: none;
  }
  .pub-year-nav a:hover {
    text-decoration: underline;
  }

  /* Year group heading */
  .yearGroup {
    display: block;
    font-size: 1.4em;
    font-weight: bold;
    color: #0064a4;
    margin: 1em 0 0.25em;
    padding-bottom: 0.15em;
    border-bottom: 2px solid #0064a4;
  }

  /* Publication list */
  ul.papers {
    list-style-type: none;
    padding: 0;
    margin: 0 0 1.5em 0;
    font-size: 0.95em;
  }
  ul.papers li {
    border-bottom: 1px solid #ccc;
    padding: 12px 0;
    line-height: 1.5;
    list-style: none;
  }
  ul.papers li:last-child {
    border-bottom: none;
  }

  /* Inline publication parts */
  .papers .author { color: #333; }
  .papers .mainAuthor { color: #0064a4; font-weight: bold; }
  .papers .title { font-weight: bold; display: inline; }
  .papers .title a { color: inherit; text-decoration: none; }
  .papers .title a:hover { text-decoration: underline; }
  .papers .venue { font-style: italic; }
  .papers .year { color: #555; }

  /* Tag pills */
  .papers .tag {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 10px;
    border-radius: 5px;
    font-size: 0.8em;
    font-weight: bold;
    vertical-align: middle;
    color: #fff;
  }
  .papers .tag_Journal { background-color: #2ECC71; }
  .papers .tag_Conference { background-color: #0064a4; }
  .papers .tag_Workshop { background-color: #666; }
  .papers .tag_Preprint { background-color: #666; }
  .papers .tag_Book_Chapter,
  .papers .tag_Chapter { background-color: #999; }
  .papers .tag_Thesis { background-color: #8e44ad; }

  /* Link styling inside paper entries */
  ul.papers a {
    text-decoration: none;
    color: #0064a4;
  }
  ul.papers a:hover {
    text-decoration: underline;
  }

  /* Override theme's underline for nav anchors */
  .archive .pub-year-nav a,
  .archive ul.papers a {
    text-decoration: none;
  }
  .archive .pub-year-nav a:hover,
  .archive ul.papers a:hover {
    text-decoration: underline;
  }

  /* Project cards */
  .project-card {
    margin: 1.5em 0;
    overflow: hidden;
  }
  .project-card__image {
    float: left;
    width: 175px;
    max-width: 30%;
    height: auto;
    margin: 0.25em 20px 0.5em 0;
    border-radius: 4px;
    background-color: #f4f4f4;
  }
  .project-card__body {
    overflow: hidden;
  }
  .project-card__body p {
    margin: 0 0 0.5em;
    line-height: 1.55;
  }
  .project-card__links {
    font-size: 0.9em;
  }
  .project-card__links a {
    color: #0064a4;
    text-decoration: none;
  }
  .project-card__links a:hover {
    text-decoration: underline;
  }
  .clear { clear: both; }

  @media (max-width: 600px) {
    .project-card__image {
      float: none;
      display: block;
      width: 100%;
      max-width: 100%;
      margin: 0 0 0.75em 0;
    }
  }
</style>

<!-- end custom head snippets -->
